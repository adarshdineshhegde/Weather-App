<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="app">
    <header class="header">
        <div class="header__brand">Weather App</div>
        <button
          type="button"
          id="nav-toggle"
          class="nav-toggle"
          aria-label="Toggle navigation"
          aria-expanded="false"
          aria-controls="main-nav"
        >☰</button>
        <nav id="main-nav" class="nav" aria-label="Main">
          <a href="#" class="nav__link nav__link--active">Dashboard</a>
          <a href="#" class="nav__link nav__link--disabled">Map</a>
          <a href="#" class="nav__link nav__link--disabled">Education</a>
          <a href="#" class="nav__link nav__link--disabled">Historical</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
          <span class="theme-toggle__icon">☀️</span>
        </button>
      </header>

    <main class="main">
      <section class="search-section">
        <form id="search-form" class="search-form">
            <div class="search-form__row">
              <input
                type="search"
                id="search-input"
                class="search-input"
                placeholder="Search for a city..."
                autocomplete="off"
                required
              />
              <button
                type="button"
                id="clear-city"
                class="clear-btn"
                aria-label="Clear saved city"
                hidden
              >✕</button>
            </div>
          </form>
        <div id="error-banner" class="error-banner" role="alert" hidden></div>
      </section>

      <div id="loading" class="loading" hidden>
        <div class="loading__spinner" aria-hidden="true"></div>
        <p class="loading__text">Fetching weather data…</p>
      </div>

      <section id="weather-card" class="weather-card weather-card--empty">
        <p id="weather-empty" class="weather-card__empty">Search for a city to see weather</p>

        <div id="weather-content" class="weather-content" hidden>
          <div class="weather-card__header">
            <h2 id="weather-city" class="weather-card__city"></h2>
            <p id="weather-date" class="weather-card__date"></p>
          </div>

          <div id="weather-temp-block" class="weather-card__temp-block weather-card__temp-block--mild">
            <span id="weather-icon" class="weather-card__icon" aria-hidden="true"></span>
            <div class="weather-card__temp-info">
              <p id="weather-temp" class="weather-card__temp"></p>
              <p id="weather-condition" class="weather-card__condition"></p>
            </div>
          </div>

          <div class="weather-card__stats">
            <div class="stat-badge">
              <span class="stat-badge__label">Humidity</span>
              <span id="weather-humidity" class="stat-badge__value"></span>
            </div>
            <div class="stat-badge">
              <span class="stat-badge__label">Wind</span>
              <span id="weather-wind" class="stat-badge__value"></span>
            </div>
            <div class="stat-badge">
              <span class="stat-badge__label">Pressure</span>
              <span id="weather-pressure" class="stat-badge__value"></span>
            </div>
          </div>
        </div>
      </section>

      <section id="forecast-section" class="forecast-strip forecast-strip--empty">
        <p id="forecast-empty" class="forecast-strip__empty">5-day forecast will appear here</p>
        <div id="forecast-content" class="forecast-strip__grid" hidden></div>
      </section>

      <section id="insights-section" class="insights-panel insights-panel--empty">
        <p id="insights-empty" class="insights-panel__empty">Hourly insights will appear here</p>
        <div id="insights-content" class="insights-panel__list" hidden></div>
      </section>
    </main>

    <footer class="footer">
      <a href="#">Privacy Policy</a>
      <span>·</span>
      <a href="#">Terms of Service</a>
      <span>·</span>
      <a href="#">Scientific Data Sources</a>
    </footer>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/weatherCodes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
